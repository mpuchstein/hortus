name: release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    name: build ${{ matrix.target.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            name: linux-x86_64
            archive: hortus-linux-x86_64.tar.gz
            binary: hortus
          - target: x86_64-apple-darwin
            os: macos-latest
            name: macos-x86_64
            archive: hortus-macos-x86_64.tar.gz
            binary: hortus
          - target: aarch64-apple-darwin
            os: macos-latest
            name: macos-aarch64
            archive: hortus-macos-aarch64.tar.gz
            binary: hortus
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            name: windows-x86_64
            archive: hortus-windows-x86_64.zip
            binary: hortus.exe
    steps:
      - uses: actions/checkout@v5
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - name: Cache cargo
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ matrix.target }}-${{ hashFiles('**/Cargo.lock') }}
      - name: Build release binary
        run: cargo build --release --target ${{ matrix.target }} --locked
      - name: Package archive (Unix)
        if: matrix.os != 'windows-latest'
        run: |
          mkdir -p dist
          cp target/${{ matrix.target }}/release/${{ matrix.binary }} dist/${{ matrix.binary }}
          (cd dist && tar czf ${{ matrix.archive }} ${{ matrix.binary }})
      - name: Package archive (Windows)
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist | Out-Null
          Copy-Item target/${{ matrix.target }}/release/${{ matrix.binary }} dist/${{ matrix.binary }}
          Compress-Archive -Path dist/${{ matrix.binary }} -DestinationPath ${{ matrix.archive }} -Force
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.name }}
          path: dist/${{ matrix.archive }}
          if-no-files-found: error

  publish:
    name: publish release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
      - name: List downloaded artifacts
        run: ls -la artifacts/
      - name: Read CHANGELOG section for this tag
        id: changelog
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          if [ -f CHANGELOG.md ]; then
            awk "/^## \\[${VERSION}\\]/,/^## \\[/" CHANGELOG.md | head -n -1 > release-notes.md || true
          fi
          if [ ! -s release-notes.md ]; then
            echo "## hortus ${VERSION}" > release-notes.md
            echo "" >> release-notes.md
            echo "See [CHANGELOG.md](https://github.com/mpuchstein/hortus/blob/main/CHANGELOG.md) for the full release notes." >> release-notes.md
          fi
      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          name: hortus ${{ github.ref_name }}
          body_path: release-notes.md
          files: |
            artifacts/*/hortus-*.tar.gz
            artifacts/*/hortus-*.zip
          fail_on_unmatched_files: true

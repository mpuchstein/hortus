<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>__TITLE__</title>
<style>
  :root {
    --bg: #0e1411;
    --ink: #d6e4dc;
    --ink-soft: #93a8a0;
    --ink-dim: #5a6b65;
    --moss: #5fb98a;
    --moss-soft: #2d4a3c;
    --bloom: #c8e6c0;
    --rose: #d99a8a;
    --line: #1f2c27;
    --accent: #b6e3a5;
  }
  * { box-sizing: border-box; }
  html, body {
    margin: 0; padding: 0; height: 100%;
    background: var(--bg); color: var(--ink);
    font-family: ui-serif, "Iowan Old Style", "Apple Garamond", Georgia, serif;
    font-size: 15px; line-height: 1.5;
    display: flex; flex-direction: column;
  }
  header {
    padding: 24px 32px 8px;
    border-bottom: 1px solid var(--line);
  }
  header h1 {
    margin: 0 0 4px;
    font-weight: 500;
    letter-spacing: 0.02em;
    color: var(--bloom);
  }
  header .meta { color: var(--ink-dim); font-style: italic; font-size: 13px; }
  .beds { margin-top: 8px; }
  .bed-chip {
    display: inline-block; margin: 4px 6px 0 0;
    padding: 2px 8px; border: 1px solid var(--moss-soft);
    border-radius: 999px; color: var(--moss);
    font-size: 12px; font-style: normal;
  }
  .bed-chip em { color: var(--ink-soft); font-style: normal; margin-left: 4px; }
  .count { color: var(--ink-soft); }

  main {
    display: grid; grid-template-columns: 1.4fr 1fr;
    flex: 1; min-height: 0;
  }
  #graph-wrap {
    position: relative; border-right: 1px solid var(--line);
    background:
      radial-gradient(ellipse at 30% 20%, rgba(95,185,138,0.04), transparent 60%),
      radial-gradient(ellipse at 70% 80%, rgba(217,154,138,0.04), transparent 60%);
  }
  #graph { display: block; width: 100%; height: 100%; cursor: grab; }
  #graph:active { cursor: grabbing; }

  aside {
    overflow-y: auto; padding: 16px 24px 80px;
  }
  .seed {
    padding: 14px 0; border-bottom: 1px dashed var(--line);
  }
  .seed header {
    padding: 0; border: none; margin-bottom: 4px;
    color: var(--ink-soft); font-size: 12px;
    display: flex; gap: 10px; align-items: baseline; flex-wrap: wrap;
  }
  .seed .id { color: var(--moss); font-family: ui-monospace, "SF Mono", Menlo, monospace; }
  .seed .date { color: var(--ink-dim); font-variant-numeric: tabular-nums; }
  .seed .mood { color: var(--rose); font-style: italic; }
  .seed .tags { display: inline; }
  .seed .tag {
    display: inline-block; margin-right: 6px;
    color: var(--moss); font-size: 11px;
  }
  .seed .tag::before { content: "#"; opacity: 0.6; margin-right: 1px; }
  .seed .body { color: var(--ink); }
  .seed .body p:first-child { margin-top: 0; }
  .seed .body p:last-child { margin-bottom: 0; }
  .seed.highlight {
    background: linear-gradient(90deg, rgba(95,185,138,0.08), transparent);
    border-radius: 6px;
  }
  .seed.composted .body { opacity: 0.55; font-style: italic; }
  .seed.composted header { color: var(--ink-dim); }
  .seed.composted .id { color: var(--ink-dim); }
  .composted-tag {
    color: var(--ink-dim); font-style: italic; font-size: 11px;
    margin-left: 4px;
  }
  .epitaph {
    color: var(--ink-dim); font-style: italic;
    margin: 4px 0 0; font-size: 13px;
  }

  .node circle {
    fill: var(--moss);
    stroke: var(--bg);
    stroke-width: 1.5;
    transition: r 0.2s, fill 0.2s;
  }
  .node.composted circle {
    fill: var(--ink-dim);
    fill-opacity: 0.5;
    stroke-dasharray: 2 2;
  }
  .node.dimmed circle { opacity: 0.18; }
  .node.highlighted circle {
    fill: var(--bloom);
    stroke: var(--rose);
    stroke-width: 2;
  }
  .node text {
    fill: var(--ink-soft);
    font-family: ui-monospace, "SF Mono", Menlo, monospace;
    font-size: 10px;
    pointer-events: none;
    opacity: 0;
    transition: opacity 0.2s;
  }
  .node.composted text { font-style: italic; }
  .node.revealed text { opacity: 0.9; }
  .link { stroke: var(--moss-soft); stroke-opacity: 0.55; }
  .link.dimmed { stroke-opacity: 0.05; }
  .link.bed { stroke: var(--moss); }
  .link.tag { stroke: var(--rose); stroke-dasharray: 2 3; }
  .link.to-composted { stroke-dasharray: 3 3; }

  #mood-timeline {
    padding: 12px 32px 8px;
    border-bottom: 1px solid var(--line);
    background: var(--bg);
  }
  #mood-timeline h2 {
    margin: 0 0 6px;
    font-size: 12px; font-weight: normal;
    color: var(--ink-dim);
    letter-spacing: 0.1em;
    text-transform: uppercase;
  }
  #mood-timeline svg { display: block; width: 100%; height: 70px; }
  .mood-bar { transition: opacity 0.2s; }
  .mood-bar:hover { opacity: 0.7; }
  .mood-axis {
    stroke: var(--ink-dim); stroke-opacity: 0.3; stroke-width: 1;
  }
  .mood-label {
    fill: var(--ink-dim); font-size: 9px;
    font-family: ui-monospace, "SF Mono", Menlo, monospace;
  }

  .legend {
    position: absolute; left: 12px; bottom: 12px;
    color: var(--ink-dim); font-size: 11px;
    background: rgba(14,20,17,0.6);
    padding: 6px 10px; border-radius: 4px;
    border: 1px solid var(--line);
  }
  .legend .dot { display: inline-block; width: 8px; height: 8px; border-radius: 50%; margin-right: 4px; vertical-align: middle; }
  .legend .bed { background: var(--moss); }
  .legend .tag { background: var(--rose); }
  .legend .composted { background: var(--ink-dim); opacity: 0.5; }
</style>
</head>
<body>
<header>
  <h1>hortus · bloom</h1>
  <div class="meta">__COUNTS__</div>
  <div class="beds">__BEDS__</div>
</header>
<div id="mood-timeline">
  <h2>weather over time</h2>
  __MOOD_TIMELINE__
</div>
<main>
  <div id="graph-wrap">
    <svg id="graph"></svg>
    <div class="legend">
      <span class="dot bed"></span> same bed
      <span style="margin-left:10px"><span class="dot tag"></span> shared tag</span>
      <span style="margin-left:10px"><span class="dot composted"></span> composted</span>
    </div>
  </div>
  <aside id="side">
    __SIDES__
  </aside>
</main>

<script>
(function() {
  const NODES = __NODES__;
  const EDGES = __EDGES__;
  const MOOD_DATA = __MOOD_DATA__;
  const svg = document.getElementById('graph');
  const wrap = document.getElementById('graph-wrap');
  const side = document.getElementById('side');

  // ----- Mood timeline -----
  const moodTimeline = document.getElementById('mood-timeline');
  if (MOOD_DATA && MOOD_DATA.length > 0) {
    const tlSvg = moodTimeline.querySelector('svg');
    const tlW = tlSvg.clientWidth || 800;
    const tlH = 70;
    tlSvg.setAttribute('viewBox', `0 0 ${tlW} ${tlH}`);
    const NS = 'http://www.w3.org/2000/svg';
    const padX = 8, padTop = 4, padBottom = 14;
    const innerW = tlW - padX * 2;
    const innerH = tlH - padTop - padBottom;
    const maxCount = Math.max(...MOOD_DATA.map(d => d.count), 1);
    const barW = Math.max(8, Math.min(40, innerW / MOOD_DATA.length - 4));
    const gap = (innerW - barW * MOOD_DATA.length) / Math.max(1, MOOD_DATA.length - 1);

    MOOD_DATA.forEach((d, i) => {
      const x = padX + i * (barW + gap);
      const h = (d.count / maxCount) * innerH;
      const y = padTop + (innerH - h);
      const rect = document.createElementNS(NS, 'rect');
      rect.setAttribute('x', x);
      rect.setAttribute('y', y);
      rect.setAttribute('width', barW);
      rect.setAttribute('height', Math.max(2, h));
      rect.setAttribute('fill', d.color);
      rect.setAttribute('rx', 2);
      rect.setAttribute('class', 'mood-bar');
      const title = document.createElementNS(NS, 'title');
      title.textContent = `${d.date} — ${d.count} seed${d.count === 1 ? '' : 's'} — ${d.mood || 'no mood'}`;
      rect.appendChild(title);
      tlSvg.appendChild(rect);

      if (MOOD_DATA.length <= 14 || i % Math.ceil(MOOD_DATA.length / 8) === 0) {
        const label = document.createElementNS(NS, 'text');
        label.setAttribute('x', x + barW / 2);
        label.setAttribute('y', tlH - 2);
        label.setAttribute('text-anchor', 'middle');
        label.setAttribute('class', 'mood-label');
        label.textContent = d.date.slice(5);
        tlSvg.appendChild(label);
      }
    });
  } else {
    moodTimeline.style.display = 'none';
  }

  let width = wrap.clientWidth;
  let height = wrap.clientHeight;
  svg.setAttribute('viewBox', `0 0 ${width} ${height}`);

  const NS = 'http://www.w3.org/2000/svg';
  const gLinks = document.createElementNS(NS, 'g');
  const gNodes = document.createElementNS(NS, 'g');
  svg.appendChild(gLinks);
  svg.appendChild(gNodes);

  // Initialize nodes with random positions near center
  const cx = width / 2, cy = height / 2;
  NODES.forEach(n => {
    n.x = cx + (Math.random() - 0.5) * 200;
    n.y = cy + (Math.random() - 0.5) * 200;
    n.vx = 0; n.vy = 0;
  });

  // Build node lookup
  const byId = new Map(NODES.map(n => [n.id, n]));

  // Render edges
  const linkEls = new Map();
  EDGES.forEach((e, i) => {
    const line = document.createElementNS(NS, 'line');
    line.setAttribute('class', 'link ' + e.kind);
    gLinks.appendChild(line);
    linkEls.set(i, line);
  });

  // Render nodes
  const nodeEls = new Map();
  NODES.forEach(n => {
    const g = document.createElementNS(NS, 'g');
    g.setAttribute('class', 'node' + (n.is_composted ? ' composted' : ''));
    const c = document.createElementNS(NS, 'circle');
    c.setAttribute('r', 5);
    g.appendChild(c);
    const t = document.createElementNS(NS, 'text');
    t.setAttribute('dx', 8);
    t.setAttribute('dy', 3);
    t.textContent = n.id;
    g.appendChild(t);
    gNodes.appendChild(g);
    nodeEls.set(n.id, g);
    g.addEventListener('mouseenter', () => focus(n.id));
    g.addEventListener('mouseleave', () => focus(null));
    g.addEventListener('click', () => focus(n.id, true));
  });

  // Highlight
  function focus(id, pin) {
    if (pin && pinned === id) { pinned = null; focus(null); return; }
    if (pin) pinned = id;
    const neighbours = new Set();
    if (id) {
      EDGES.forEach(e => {
        if (e.source === id) neighbours.add(e.target);
        if (e.target === id) neighbours.add(e.source);
      });
      neighbours.add(id);
    }
    nodeEls.forEach((el, nid) => {
      el.classList.remove('dimmed', 'highlighted', 'revealed');
      if (id) {
        if (nid === id) el.classList.add('highlighted', 'revealed');
        else if (neighbours.has(nid)) el.classList.add('revealed');
        else el.classList.add('dimmed');
      } else if (pinned) {
        // pinned: dim others
        if (nid === pinned) el.classList.add('highlighted', 'revealed');
        else if (neighbours.has(nid)) el.classList.add('revealed');
        else el.classList.add('dimmed');
      }
    });
    linkEls.forEach((el, i) => {
      el.classList.remove('dimmed');
      if (id || pinned) {
        const e = EDGES[i];
        const focusId = id || pinned;
        if (e.source !== focusId && e.target !== focusId) el.classList.add('dimmed');
      }
    });
    if (id) {
      const el = document.getElementById('seed-' + id);
      if (el) {
        document.querySelectorAll('.seed.highlight').forEach(s => s.classList.remove('highlight'));
        el.classList.add('highlight');
        el.scrollIntoView({ behavior: 'smooth', block: 'center' });
      }
    } else {
      document.querySelectorAll('.seed.highlight').forEach(s => s.classList.remove('highlight'));
    }
  }
  let pinned = null;

  // Force simulation
  function step() {
    const repulsion = 1400;
    const springLen = 80;
    const springK = 0.04;
    const damping = 0.85;
    const centerK = 0.002;

    for (let i = 0; i < NODES.length; i++) {
      const a = NODES[i];
      let fx = 0, fy = 0;
      for (let j = 0; j < NODES.length; j++) {
        if (i === j) continue;
        const b = NODES[j];
        let dx = a.x - b.x, dy = a.y - b.y;
        let d2 = dx*dx + dy*dy + 0.01;
        let d = Math.sqrt(d2);
        let f = repulsion / d2;
        fx += (dx / d) * f;
        fy += (dy / d) * f;
      }
      // Center pull
      fx += (cx - a.x) * centerK;
      fy += (cy - a.y) * centerK;
      a._fx = fx; a._fy = fy;
    }
    EDGES.forEach(e => {
      const a = byId.get(e.source), b = byId.get(e.target);
      if (!a || !b) return;
      const dx = b.x - a.x, dy = b.y - a.y;
      const d = Math.sqrt(dx*dx + dy*dy) + 0.01;
      const f = (d - springLen) * springK;
      const fx = (dx / d) * f, fy = (dy / d) * f;
      a._fx += fx; a._fy += fy;
      b._fx -= fx; b._fy -= fy;
    });
    NODES.forEach(n => {
      n.vx = (n.vx + n._fx * 0.1) * damping;
      n.vy = (n.vy + n._fy * 0.1) * damping;
      n.x += n.vx; n.y += n.vy;
    });
  }

  function render() {
    EDGES.forEach((e, i) => {
      const a = byId.get(e.source), b = byId.get(e.target);
      if (!a || !b) return;
      const el = linkEls.get(i);
      el.setAttribute('x1', a.x);
      el.setAttribute('y1', a.y);
      el.setAttribute('x2', b.x);
      el.setAttribute('y2', b.y);
    });
    NODES.forEach(n => {
      const g = nodeEls.get(n.id);
      g.setAttribute('transform', `translate(${n.x},${n.y})`);
    });
  }

  // Drag handling
  let dragNode = null;
  svg.addEventListener('mousedown', e => {
    const target = e.target.closest('.node');
    if (!target) return;
    const id = [...nodeEls.entries()].find(([_, el]) => el === target)?.[0];
    if (!id) return;
    dragNode = byId.get(id);
    dragNode.fixed = true;
    e.preventDefault();
  });
  window.addEventListener('mousemove', e => {
    if (!dragNode) return;
    const rect = svg.getBoundingClientRect();
    dragNode.x = (e.clientX - rect.left) * (width / rect.width);
    dragNode.y = (e.clientY - rect.top) * (height / rect.height);
    dragNode.vx = 0; dragNode.vy = 0;
  });
  window.addEventListener('mouseup', () => { if (dragNode) dragNode.fixed = false; dragNode = null; });

  // Resize
  window.addEventListener('resize', () => {
    width = wrap.clientWidth; height = wrap.clientHeight;
    svg.setAttribute('viewBox', `0 0 ${width} ${height}`);
  });

  // Loop
  let ticks = 0;
  function loop() {
    if (ticks++ < 600) {
      step();
      render();
      requestAnimationFrame(loop);
    } else {
      // settle then stop
      render();
    }
  }
  loop();
})();
</script>
</body>
</html>
